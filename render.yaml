services:
  - type: web
    name: vidvault-dashboard
    env: python
    buildCommand: "bash ./build.sh"
    startCommand: "cd server && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
